name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    # Dummy values — build/typecheck/tests don't touch a live database.
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/conflux?schema=public
      DIRECT_URL: postgresql://user:pass@localhost:5432/conflux?schema=public
      AUTH_SECRET: ci-dummy-secret-ci-dummy-secret-0123456789
      NEXT_PUBLIC_WS_URL: ws://localhost:3000
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Unit & property tests
        run: npm test

      - name: Production build
        run: npm run build
